<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BuildCare Pro — Smart Residential Building Management Platform</title>
<style>
:root{--p:#6366f1;--pl:#818cf8;--pd:#4f46e5;--p10:rgba(99,102,241,0.1);--p20:rgba(99,102,241,0.2);--s:#8b5cf6;--a:#06b6d4;--a10:rgba(6,182,212,0.1);--ok:#10b981;--ok10:rgba(16,185,129,0.1);--warn:#f59e0b;--warn10:rgba(245,158,11,0.1);--err:#ef4444;--err10:rgba(239,68,68,0.1);--info:#3b82f6;--info10:rgba(59,130,246,0.1);--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--card:rgba(255,255,255,0.055);--cardhov:rgba(255,255,255,0.09);--bdr:rgba(255,255,255,0.1);--bdr2:rgba(255,255,255,0.06);--t:#e6edf3;--tm:#8b949e;--th:#f0f6fc;--sbg:#0a0f1a;--sw:240px;--sw-c:64px;--hh:62px;--r:12px;--r2:8px;--r3:20px;--shadow:0 4px 20px rgba(0,0,0,0.4);--shadow2:0 8px 32px rgba(0,0,0,0.5);--trans:all 0.25s ease;--grad:linear-gradient(135deg,#6366f1,#8b5cf6);--grad2:linear-gradient(135deg,#06b6d4,#6366f1);--grad3:linear-gradient(135deg,#10b981,#06b6d4);--grad4:linear-gradient(135deg,#f59e0b,#ef4444);}
[data-theme="light"]{--bg:#f0f4ff;--bg2:#e8eeff;--bg3:#dde3ff;--card:rgba(255,255,255,0.85);--cardhov:rgba(255,255,255,0.98);--bdr:rgba(99,102,241,0.15);--bdr2:rgba(99,102,241,0.08);--t:#1e1b4b;--tm:#4c4f6e;--th:#0f0e2a;--sbg:#1e1b4b;--shadow:0 4px 20px rgba(99,102,241,0.12);--shadow2:0 8px 32px rgba(99,102,241,0.18);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Inter',sans-serif;background:var(--bg);color:var(--t);line-height:1.6;overflow-x:hidden;min-height:100vh;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--p);border-radius:10px;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit;}
input,select,textarea{font-family:inherit;font-size:inherit;color:var(--t);outline:none;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--sbg);border-right:1px solid var(--bdr2);display:flex;flex-direction:column;position:relative;z-index:200;transition:width .25s ease,min-width .25s ease;overflow:hidden;box-shadow:2px 0 20px rgba(0,0,0,0.3);}
.sidebar.collapsed{width:var(--sw-c);min-width:var(--sw-c);}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--bdr2);min-height:62px;flex-shrink:0;}
.logo-icon{width:34px;height:34px;background:var(--grad);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(99,102,241,0.4);}
.logo-text{overflow:hidden;white-space:nowrap;}
.logo-name{display:block;font-size:15px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px;}
.logo-sub{font-size:9px;color:var(--tm);letter-spacing:2px;text-transform:uppercase;}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:none;}
.sidebar-nav::-webkit-scrollbar{display:none;}
.nav-section{padding:10px 14px 4px;font-size:9px;font-weight:700;color:var(--tm);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;}
.collapsed .nav-section{opacity:0;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 18px;cursor:pointer;transition:var(--trans);position:relative;white-space:nowrap;color:var(--tm);}
.nav-item:hover{background:var(--p10);color:var(--pl);}
.nav-item.active{background:var(--p20);color:var(--pl);}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;height:100%;width:3px;background:var(--grad);border-radius:0 3px 3px 0;}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.nav-label{font-size:12.5px;font-weight:500;overflow:hidden;transition:opacity .2s;}
.collapsed .nav-label,.collapsed .nav-badge-item{opacity:0;pointer-events:none;}
.nav-badge-item{margin-left:auto;background:var(--err);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0;}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--bdr2);}
.building-chip{display:flex;align-items:center;gap:8px;background:var(--p10);border:1px solid var(--p20);border-radius:8px;padding:8px 10px;overflow:hidden;}
.building-dot{width:8px;height:8px;background:var(--ok);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px var(--ok);animation:pulse 2s infinite;}
.building-chip-text{font-size:11px;color:var(--pl);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.main-wrapper{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.header{height:var(--hh);min-height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:100;backdrop-filter:blur(12px);box-shadow:0 2px 12px var(--shadow);}
.menu-btn{width:34px;height:34px;border-radius:8px;background:var(--card);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:var(--trans);}
.menu-btn:hover{background:var(--p10);border-color:var(--p);color:var(--pl);}
.page-title{font-size:16px;font-weight:700;color:var(--th);white-space:nowrap;flex-shrink:0;}
.search-box{flex:1;max-width:380px;position:relative;margin:0 auto;}
.search-box input{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:7px 14px 7px 36px;font-size:12.5px;color:var(--t);transition:var(--trans);}
.search-box input:focus{border-color:var(--p);background:var(--p10);}
.search-box input::placeholder{color:var(--tm);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--tm);pointer-events:none;}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.hbtn{width:34px;height:34px;border-radius:8px;background:var(--card);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:15px;transition:var(--trans);position:relative;flex-shrink:0;}
.hbtn:hover{background:var(--p10);border-color:var(--p);color:var(--pl);}
.hbtn .nbadge{position:absolute;top:-4px;right:-4px;background:var(--err);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}
.demo-btn{background:var(--grad4);color:#fff;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;border:none;white-space:nowrap;box-shadow:0 4px 12px rgba(245,158,11,0.3);transition:var(--trans);flex-shrink:0;}
.demo-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(245,158,11,0.4);}
.user-avatar{width:34px;height:34px;background:var(--grad);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;}
.module{display:none;padding:24px;min-height:calc(100vh - var(--hh));animation:fadeIn .3s ease;}
.module.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.section-title{font-size:20px;font-weight:800;color:var(--th);letter-spacing:-0.3px;}
.section-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.section-sub{font-size:12px;color:var(--tm);margin-top:2px;}
.section-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:22px;}
.kpi-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;transition:var(--trans);cursor:default;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:0;transition:opacity .3s;}
.kpi-card:hover{background:var(--cardhov);transform:translateY(-2px);box-shadow:var(--shadow);}
.kpi-card:hover::before{opacity:1;}
.kpi-icon{font-size:22px;margin-bottom:8px;display:block;}
.kpi-value{font-size:22px;font-weight:800;color:var(--th);letter-spacing:-0.5px;display:block;}
.kpi-label{font-size:11px;color:var(--tm);display:block;margin-top:2px;}
.kpi-sub{font-size:10px;color:var(--tm);margin-top:4px;display:block;}
.kpi-card.acc-ok{border-color:rgba(16,185,129,0.3);}
.kpi-card.acc-err{border-color:rgba(239,68,68,0.3);}
.kpi-card.acc-warn{border-color:rgba(245,158,11,0.3);}
.kpi-card.acc-p{border-color:rgba(99,102,241,0.3);}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;}
.card-header{padding:14px 18px 12px;border-bottom:1px solid var(--bdr2);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.card-title{font-size:13.5px;font-weight:700;color:var(--th);}
.card-body{padding:16px 18px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;transition:var(--trans);border:none;cursor:pointer;white-space:nowrap;}
.btn-p{background:var(--grad);color:#fff;box-shadow:0 4px 12px var(--p10);}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 16px var(--p20);}
.btn-s{background:var(--card);border:1px solid var(--bdr);color:var(--t);}
.btn-s:hover{background:var(--cardhov);border-color:var(--p);color:var(--pl);}
.btn-ok{background:var(--ok10);border:1px solid var(--ok);color:var(--ok);}
.btn-err{background:var(--err10);border:1px solid var(--err);color:var(--err);}
.btn-warn{background:var(--warn10);border:1px solid var(--warn);color:var(--warn);}
.btn-sm{padding:4px 10px;font-size:11px;}
.b-ok{background:var(--ok10);color:var(--ok);border:1px solid rgba(16,185,129,0.3);padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;display:inline-block;}
.b-err{background:var(--err10);color:var(--err);border:1px solid rgba(239,68,68,0.3);padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;display:inline-block;}
.b-warn{background:var(--warn10);color:var(--warn);border:1px solid rgba(245,158,11,0.3);padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;display:inline-block;}
.b-info{background:var(--info10);color:var(--info);border:1px solid rgba(59,130,246,0.3);padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;display:inline-block;}
.b-p{background:var(--p10);color:var(--pl);border:1px solid var(--p20);padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;display:inline-block;}
.b-g{background:rgba(139,148,158,0.15);color:var(--tm);border:1px solid rgba(139,148,158,0.3);padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;display:inline-block;}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--bg2);}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;border-bottom:1px solid var(--bdr);}
tbody tr{border-bottom:1px solid var(--bdr2);transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--cardhov);}
tbody td{padding:10px 14px;font-size:12.5px;color:var(--t);white-space:nowrap;}
.tdn{font-weight:600;color:var(--th);}
.tds{font-size:11px;color:var(--tm);margin-top:1px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.ff{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11.5px;font-weight:600;color:var(--tm);letter-spacing:0.3px;}
.field input,.field select,.field textarea{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:12.5px;color:var(--t);transition:var(--trans);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p);background:var(--p10);box-shadow:0 0 0 3px var(--p10);}
.field select option{background:var(--bg2);color:var(--t);}
.field textarea{resize:vertical;min-height:80px;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-ov.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;animation:mIn .25s ease;box-shadow:var(--shadow2);}
.modal-box.wide{max-width:860px;}
@keyframes mIn{from{opacity:0;transform:scale(0.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-hd h3{font-size:15px;font-weight:700;color:var(--th);}
.modal-cl{width:28px;height:28px;border-radius:7px;background:var(--card);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tm);transition:var(--trans);}
.modal-cl:hover{background:var(--err10);border-color:var(--err);color:var(--err);}
.modal-bd{padding:20px;overflow-y:auto;flex:1;}
.modal-ft{padding:14px 20px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;}
.toast-c{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:12px 16px;font-size:13px;min-width:240px;max-width:340px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow2);animation:tIn .3s ease;pointer-events:all;}
.toast.ok{border-color:var(--ok);}
.toast.err{border-color:var(--err);}
.toast.warn{border-color:var(--warn);}
@keyframes tIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.fbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.fbar input,.fbar select{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--t);}
.fbar input:focus,.fbar select:focus{border-color:var(--p);background:var(--p10);outline:none;}
.fbar input::placeholder{color:var(--tm);}
.fbar select option{background:var(--bg2);}
.pb{width:100%;height:6px;background:var(--bdr);border-radius:10px;overflow:hidden;}
.pf{height:100%;border-radius:10px;background:var(--grad);transition:width .6s ease;}
.pf.ok{background:var(--ok);}
.pf.warn{background:var(--warn);}
.pf.err{background:var(--err);}
.afeed{display:flex;flex-direction:column;gap:0;}
.aitem{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--bdr2);}
.aitem:last-child{border-bottom:none;}
.adot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.atxt{font-size:12.5px;color:var(--t);flex:1;}
.atxt b{font-weight:600;color:var(--th);}
.atime{font-size:10.5px;color:var(--tm);white-space:nowrap;margin-top:1px;}
.son{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--ok);}
.son::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok);animation:pulse 1.5s infinite;}
.cctv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.cam-card{background:#000;border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--bdr);aspect-ratio:16/9;}
.cam-canvas{width:100%;height:100%;display:block;}
.cam-lbl{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.72);color:#fff;font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:0.5px;}
.cam-st{position:absolute;top:8px;right:8px;display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.72);padding:3px 7px;border-radius:4px;}
.rec-dot{width:6px;height:6px;border-radius:50%;background:var(--err);animation:pulse 1s infinite;}
.cam-tm{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.72);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-family:monospace;}
.notif-panel{position:absolute;top:46px;right:0;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;width:300px;max-height:380px;overflow-y:auto;z-index:400;box-shadow:var(--shadow2);display:none;animation:fadeIn .2s ease;}
.notif-panel.open{display:block;}
.notif-hd{padding:12px 16px;font-size:13px;font-weight:700;color:var(--th);border-bottom:1px solid var(--bdr2);}
.nitem{padding:10px 16px;border-bottom:1px solid var(--bdr2);cursor:pointer;transition:background .15s;}
.nitem:hover{background:var(--cardhov);}
.ntitle{font-size:12.5px;font-weight:600;color:var(--th);}
.ndesc{font-size:11px;color:var(--tm);margin-top:1px;}
.kanban{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.kcol{background:var(--bg2);border-radius:10px;padding:12px;}
.kcol-title{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.kcard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:var(--trans);}
.kcard:hover{background:var(--cardhov);transform:translateY(-1px);}
.rm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.phase-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:var(--trans);}
.phase-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--p);}
.phase-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.phase-card.done::before{background:var(--ok);}
.phase-card.active::before{background:var(--grad);}
.phase-card.soon::before{background:var(--warn);}
.phase-card.future::before{background:var(--bdr);}
.phase-n{font-size:10px;font-weight:800;color:var(--tm);letter-spacing:2px;margin-bottom:8px;}
.phase-t{font-size:15px;font-weight:800;color:var(--th);margin-bottom:6px;}
.phase-d{font-size:12px;color:var(--tm);line-height:1.5;}
.phase-tag{display:inline-block;margin-top:10px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
.tag-done{background:var(--ok10);color:var(--ok);}
.tag-active{background:var(--p10);color:var(--pl);}
.tag-soon{background:var(--warn10);color:var(--warn);}
.tag-future{background:rgba(139,148,158,0.1);color:var(--tm);}
.cl-list{display:flex;flex-direction:column;gap:6px;}
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;cursor:pointer;transition:var(--trans);}
.cl-item:hover{background:var(--cardhov);}
.cl-item.done{opacity:0.6;}
.cl-box{width:16px;height:16px;border:2px solid var(--bdr);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:var(--trans);}

    return`<div class="nav-item" id="nav_${n.id}" onclick="navigate('${n.id}')"><span class="nav-icon">${n.icon}</span><span class="nav-label">${n.lbl}</span>${n.badge?`<span class="nav-badge-item">${n.badge}</span>`:''}</div>`;

  curMod=id;

  const el=document.createElement('div');

}

// ══ CHART UTILITIES ══
function drawBar(canvas,data,opts={}){
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.parentElement?(canvas.parentElement.clientWidth-36)||400:400;
  canvas.width=W;
  const H=canvas.height||200;
  const pad={t:20,r:16,b:38,l:52};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  const allVals=data.datasets.flatMap(s=>s.data);
  const maxV=Math.max(...allVals)*1.18||100;
  const dark=document.body.getAttribute('data-theme')!=='light';
  const gc=dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const tc=dark?'#8b949e':'#64748b';
  ctx.font='10px system-ui';
  for(let i=0;i<=5;i++){
    const y=pad.t+cH-(i/5)*cH;
    ctx.strokeStyle=gc;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();
    const v=Math.round((i/5)*maxV);
    ctx.fillStyle=tc;ctx.textAlign='right';
    ctx.fillText(v>=1000?(v/1000).toFixed(0)+'k':v+'',pad.l-4,y+3);
  }
  const sets=data.datasets,labels=data.labels;
  const grpW=Math.max(6,cW/labels.length*0.7);
  const bw=grpW/sets.length;
  sets.forEach((set,si)=>{
    labels.forEach((lbl,li)=>{
      const x=pad.l+(li+0.5)*(cW/labels.length)-grpW/2+si*bw;
      const h=Math.max(2,(set.data[li]/maxV)*cH);
      const y=pad.t+cH-h;
      ctx.fillStyle=set.color;
      if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,bw-1,h,3);ctx.fill();}
      else{ctx.fillRect(x,y,bw-1,h);}
    });
  });
  labels.forEach((lbl,li)=>{
    ctx.fillStyle=tc;ctx.textAlign='center';ctx.font='10px system-ui';
    const t=lbl.length>5?lbl.slice(0,4)+'..':lbl;
    ctx.fillText(t,pad.l+(li+0.5)*(cW/labels.length),pad.t+cH+14);
  });
}
function drawLine(canvas,data){
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.parentElement?(canvas.parentElement.clientWidth-36)||400:400;
  canvas.width=W;
  const H=canvas.height||200;
  const pad={t:20,r:16,b:38,l:54};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  const allVals=data.datasets.flatMap(s=>s.data);
  const maxV=Math.max(...allVals)*1.18||100;
  const dark=document.body.getAttribute('data-theme')!=='light';
  const gc=dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const tc=dark?'#8b949e':'#64748b';
  for(let i=0;i<=5;i++){
    const y=pad.t+cH-(i/5)*cH;
    ctx.strokeStyle=gc;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();
    const v=Math.round((i/5)*maxV);
    ctx.fillStyle=tc;ctx.textAlign='right';ctx.font='10px system-ui';
    ctx.fillText(v>=1000?(v/1000).toFixed(0)+'k':v+'',pad.l-4,y+3);
  }
  data.datasets.forEach(set=>{
    const pts=set.data.map((v,i)=>({x:pad.l+(i/(set.data.length-1))*cW,y:pad.t+cH-(v/maxV)*cH}));
    const g=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
    g.addColorStop(0,set.color+'55');g.addColorStop(1,set.color+'00');
    ctx.beginPath();ctx.moveTo(pts[0].x,pad.t+cH);
    pts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,pad.t+cH);ctx.closePath();
    ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=set.color;ctx.lineWidth=2;ctx.stroke();
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=set.color;ctx.fill();});
  });
  data.labels.forEach((lbl,li)=>{
    ctx.fillStyle=tc;ctx.textAlign='center';ctx.font='10px system-ui';
    ctx.fillText(lbl,pad.l+(li/(data.labels.length-1))*cW,pad.t+cH+14);
  });
}
function drawDonut(canvas,data,colors,labels,center){
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,ouR=Math.min(W,H)*0.42,inR=ouR*0.58;
  const total=data.reduce((a,v)=>a+v,0)||1;
  let start=-Math.PI/2;
  data.forEach((v,i)=>{
    const angle=(v/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,ouR,start,start+angle);
    ctx.arc(cx,cy,inR,start+angle,start,true);ctx.closePath();
    ctx.fillStyle=colors[i]||'#6366f1';ctx.fill();
    start+=angle;
  });
  if(center){
    const dark=document.body.getAttribute('data-theme')!=='light';
    ctx.fillStyle=dark?'#f0f6fc':'#0f0e2a';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`bold ${Math.min(W,H)*0.14}px system-ui`;
    ctx.fillText(center,cx,cy-4);
    if(labels&&labels[0]){
      ctx.font=`${Math.min(W,H)*0.08}px system-ui`;
      ctx.fillStyle=dark?'#8b949e':'#4c4f6e';
      ctx.fillText(labels[0],cx,cy+Math.min(W,H)*0.16);
    }
  }
}

function filterFlats(){
  const q=(document.getElementById('fsQ')||{}).value?.toLowerCase()||'';
  const fl=(document.getElementById('fsFloor')||{}).value||'';
  const st=(document.getElementById('fsStatus')||{}).value||'';
  const ty=(document.getElementById('fsType')||{}).value||'';
  const ms=(document.getElementById('fsMaint')||{}).value||'';
  const list=flatsD.filter(f=>{
    if(q&&!`${f.num} ${f.owner} ${f.tenant}`.toLowerCase().includes(q))return false;
    if(fl&&f.floor!=fl)return false;if(st&&f.status!==st)return false;
    if(ty&&f.type!==ty)return false;if(ms&&f.ms!==ms)return false;return true;
  });
  const el=document.getElementById('flatCnt');
  if(el)el.innerHTML=flatView==='list'?renderFL(list):renderFG(list);
}

function rComplaints(){return`
  <div class="section-header"><div><div class="section-title">Complaint <span>Management</span></div>
  <div class="section-sub">${complaintsD.length} Total · ${complaintsD.filter(c=>c.status==='open').length} Open · ${complaintsD.filter(c=>c.status==='inprogress').length} In Progress</div></div>
  <div class="section-actions">
    <button class="btn btn-s btn-sm" id="cvK" onclick="switchCV('kanban')">⊟ Kanban</button>
    <button class="btn btn-s btn-sm" id="cvL" onclick="switchCV('list')">☰ List</button>
    <button class="btn btn-p btn-sm" onclick="showAddComplaint()">+ New</button>
  </div></div>
  <div class="fbar">
    <input type="text" id="cQ" placeholder="🔍 Search..." oninput="filterC()">
    <select id="cCat" onchange="filterC()"><option value="">All Categories</option>${['Plumbing','Electrical','Security','Housekeeping','Water Supply','Lift','Gardening','Parking','Other'].map(c=>`<option>${c}</option>`).join('')}</select>
    <select id="cPri" onchange="filterC()"><option value="">All Priority</option><option>emergency</option><option>high</option><option>medium</option><option>low</option></select>
    <select id="cSt" onchange="filterC()"><option value="">All Status</option><option value="open">Open</option><option value="inprogress">In Progress</option><option value="closed">Closed</option></select>
  </div>
  <div id="cCnt">${renderKanban(complaintsD)}</div>`;}
function renderKanban(list){
  const open=list.filter(c=>c.status==='open'),ip=list.filter(c=>c.status==='inprogress'),cl=list.filter(c=>c.status==='closed');
  const kcard=c=>`<div class="kcard" onclick="showCDetail('${c.id}')">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px">
      <span style="font-size:10px;font-weight:700;color:var(--tm)">${c.id}</span>
      <span class="${c.pri==='emergency'?'b-err':c.pri==='high'?'b-warn':c.pri==='medium'?'b-info':'b-g'}" style="font-size:9px">${c.pri.toUpperCase()}</span>
    </div>
    <div style="font-size:12.5px;font-weight:600;color:var(--th);margin-bottom:3px">${c.title}</div>
    <div style="font-size:11px;color:var(--tm)">Flat ${c.flat} · ${c.cat}</div>
    ${c.assigned?`<div style="font-size:10px;color:var(--pl);margin-top:4px">👤 ${c.assigned}</div>`:''}
    <div style="font-size:10px;color:var(--tm);margin-top:2px">📅 ${c.date}</div></div>`;
  return`<div class="kanban">
    <div class="kcol"><div class="kcol-title">🔴 Open <span class="b-err">${open.length}</span></div>${open.map(kcard).join('')}</div>
    <div class="kcol"><div class="kcol-title">🟡 In Progress <span class="b-warn">${ip.length}</span></div>${ip.map(kcard).join('')}</div>
    <div class="kcol"><div class="kcol-title">🟢 Closed <span class="b-ok">${cl.length}</span></div>${cl.map(kcard).join('')}</div>
  </div>`;}
function renderCList(list){return`<div class="tw"><table><thead><tr><th>ID</th><th>Title</th><th>Flat</th><th>Category</th><th>Priority</th><th>Status</th><th>Date</th><th>Assigned</th><th></th></tr></thead>
  <tbody>${list.map(c=>`<tr><td class="tdn">${c.id}</td><td style="max-width:170px;white-space:normal;line-height:1.3">${c.title}</td><td>${c.flat}</td><td>${c.cat}</td>
  <td><span class="${c.pri==='emergency'?'b-err':c.pri==='high'?'b-warn':c.pri==='medium'?'b-info':'b-g'}">${c.pri}</span></td>
  <td><span class="${c.status==='closed'?'b-ok':c.status==='inprogress'?'b-warn':'b-err'}">${c.status}</span></td>
  <td>${c.date}</td><td>${c.assigned||'—'}</td>
  <td><button class="btn btn-s btn-sm" onclick="showCDetail('${c.id}')">View</button></td></tr>`).join('')}</tbody></table></div>`;}
function switchCV(mode){
  complaintView=mode;
  document.getElementById('cvK').className=`btn ${mode==='kanban'?'btn-p':'btn-s'} btn-sm`;
  document.getElementById('cvL').className=`btn ${mode==='list'?'btn-p':'btn-s'} btn-sm`;
  filterC();
}
function filterC(){
  const q=(document.getElementById('cQ')||{}).value?.toLowerCase()||'';
  const cat=(document.getElementById('cCat')||{}).value||'';
  const pri=(document.getElementById('cPri')||{}).value||'';
  const st=(document.getElementById('cSt')||{}).value||'';
  const list=complaintsD.filter(c=>{
    if(q&&!`${c.title} ${c.flat} ${c.cat}`.toLowerCase().includes(q))return false;
    if(cat&&c.cat!==cat)return false;if(pri&&c.pri!==pri)return false;if(st&&c.status!==st)return false;return true;
  });
  const el=document.getElementById('cCnt');if(el)el.innerHTML=complaintView==='list'?renderCList(list):renderKanban(list);
}
function showCDetail(id){
  const c=complaintsD.find(x=>x.id===id);if(!c)return;
  openModal('Complaint '+c.id,`
  <div class="fg"><div><label style="font-size:11px;color:var(--tm)">ID</label><div style="font-weight:700;color:var(--pl)">${c.id}</div></div>
  <div><label style="font-size:11px;color:var(--tm)">FLAT</label><div style="font-weight:700">${c.flat}</div></div>
  <div><label style="font-size:11px;color:var(--tm)">CATEGORY</label><span class="b-p">${c.cat}</span></div>
  <div><label style="font-size:11px;color:var(--tm)">PRIORITY</label><span class="${c.pri==='emergency'?'b-err':c.pri==='high'?'b-warn':'b-g'}">${c.pri.toUpperCase()}</span></div>
  <div><label style="font-size:11px;color:var(--tm)">STATUS</label><span class="${c.status==='closed'?'b-ok':c.status==='inprogress'?'b-warn':'b-err'}">${c.status.toUpperCase()}</span></div>
  <div><label style="font-size:11px;color:var(--tm)">DATE</label><div>${c.date}</div></div></div>
  <div style="margin-top:12px"><label style="font-size:11px;color:var(--tm)">TITLE</label><div style="font-weight:700;font-size:14px;color:var(--th);margin-top:2px">${c.title}</div></div>
  <div style="margin-top:10px"><label style="font-size:11px;color:var(--tm)">DESCRIPTION</label><div style="font-size:12.5px;line-height:1.6;margin-top:2px">${c.desc}</div></div>
  <div style="margin-top:10px"><label style="font-size:11px;color:var(--tm)">ASSIGNED TO</label><div style="font-weight:600;margin-top:2px">${c.assigned||'Unassigned'}</div></div>
  ${c.res?`<div style="background:var(--ok10);border:1px solid var(--ok);border-radius:8px;padding:10px;margin-top:12px"><div style="font-size:11px;font-weight:700;color:var(--ok)">✅ RESOLUTION</div><div style="font-size:12px;margin-top:4px">${c.res}</div></div>`:''}
  <div class="field" style="margin-top:14px"><label>Update Status</label>
    <select id="uSt" style="background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;color:var(--t)">
    <option value="open" ${c.status==='open'?'selected':''}>Open</option>
    <option value="inprogress" ${c.status==='inprogress'?'selected':''}>In Progress</option>
    <option value="closed" ${c.status==='closed'?'selected':''}>Closed</option></select></div>`,
  `<button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="updC('${c.id}')">Update</button>`);
}
function showAddComplaint(){
  openModal('Raise New Complaint',`<div class="fg">
  <div class="field"><label>Flat Number *</label><input id="ncF" placeholder="e.g. A-101"></div>
  <div class="field"><label>Category</label><select id="ncCa">${['Plumbing','Electrical','Security','Housekeeping','Water Supply','Lift','Gardening','Parking','Other'].map(c=>`<option>${c}</option>`).join('')}</select></div>

  `<button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="addC()">Submit</button>`);

function addC(){
  const flat=(document.getElementById('ncF')||{}).value?.trim(),title=(document.getElementById('ncT')||{}).value?.trim();
  if(!flat||!title){toast('Fill required fields.','warn');return;}
  const id='C'+String(complaintsD.length+1).padStart(3,'0');
  complaintsD.push({id,flat,cat:document.getElementById('ncCa').value,title,desc:document.getElementById('ncD').value,status:'open',pri:document.getElementById('ncP').value,date:new Date().toISOString().split('T')[0],assigned:document.getElementById('ncA').value,res:''});
  saveState();closeModal();toast('Complaint '+id+' raised!','ok');navigate('complaints');
}
function updC(id){
  const c=complaintsD.find(x=>x.id===id),ns=document.getElementById('uSt').value;
  if(c){c.status=ns;saveState();closeModal();toast('Complaint '+id+' updated to: '+ns,'ok');navigate('complaints');}

function startCCTV(){
  ['cam1','cam2','cam3','cam4'].forEach((id,idx)=>{
    const cv=document.getElementById(id);if(!cv)return;
    const ctx=cv.getContext('2d');
    const bgPalette=[['#0d1f0d'],['#0d0d1f'],['#1a150a'],['#0d1a1a']];
    const t=setInterval(()=>{
      if(!document.getElementById(id)){clearInterval(t);return;}
      const w=cv.width,h=cv.height;
      ctx.fillStyle=bgPalette[idx][0];ctx.fillRect(0,0,w,h);
      for(let i=0;i<1200;i++){
        const x=Math.random()*w,y=Math.random()*h,sz=Math.random()*2.5+0.5;
        const br=Math.floor(Math.random()*65+10);
        ctx.fillStyle=`rgba(${br+5},${br+15},${br},${Math.random()*0.55+0.05})`;
        ctx.fillRect(x,y,sz,sz);
      }
      ctx.strokeStyle='rgba(80,160,80,0.18)';ctx.lineWidth=1;
      for(let y=0;y<h;y+=8){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      if(idx===0||idx===2){
        const now=Date.now();
        const mx=60+Math.sin(now/600)*40,my=60+Math.cos(now/800)*30;
        ctx.strokeStyle='rgba(255,80,80,0.65)';ctx.lineWidth=1.5;
        ctx.strokeRect(mx,my,70,90);
        ctx.fillStyle='rgba(255,80,80,0.85)';ctx.font='9px monospace';ctx.fillText('MOTION',mx+2,my-3);
      }
      if(idx===1){
        ctx.strokeStyle='rgba(100,200,255,0.35)';ctx.lineWidth=1;
        ctx.strokeRect(w/2-40,h/2-50,80,100);
        ctx.fillStyle='rgba(100,200,255,0.6)';ctx.font='9px monospace';ctx.fillText('PERSON',w/2-28,h/2-53);
      }
      const now=new Date();
      const ts=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      const tel=document.getElementById(id+'_t');if(tel)tel.textContent=ts;
    },120);
    cctvTimers.push(t);
  });
}

  if(msg.includes('staff')||msg.includes('guard')||msg.includes('employee')||msg.includes('performance'))return AI_RESPONSES.staff();
  if(msg.includes('water')||msg.includes('tank'))return AI_RESPONSES.water();

  if(msg.includes('financ')||msg.includes('money')||msg.includes('income')||msg.includes('expense')||msg.includes('budget'))return AI_RESPONSES.financial();
  if(msg.includes('health')||msg.includes('score')||msg.includes('status')||msg.includes('overview'))return AI_RESPONSES.health();
  return AI_RESPONSES.default();
}

function renderChat(){
  const el=document.getElementById('chatMsgs');if(!el)return;
  if(chatHist.length===0){
    chatHist=[{role:'bot',msg:`Hello! I'm your AI Building Assistant for <strong>${BLD.name}</strong>. I have real-time access to all building data. How can I help you today?`,time:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}];
  }
  el.innerHTML=chatHist.map(m=>`<div class="msg ${m.role}"><div class="msg-bbl">${m.msg}</div><div class="msg-tm">${m.time}</div></div>`).join('');
  el.scrollTop=el.scrollHeight;
}
function sendMsg(msg){const inp=document.getElementById('chatIn');if(inp)inp.value=msg;sendChat();}
function sendChat(){
  const inp=document.getElementById('chatIn');if(!inp)return;
  const msg=inp.value.trim();if(!msg)return;
  const time=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  chatHist.push({role:'user',msg,time});
  inp.value='';renderChat();
  setTimeout(()=>{
    chatHist.push({role:'bot',msg:getAIResponse(msg),time:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})});
    saveState();renderChat();
  },700);
}

let curSlide=0;
function openInvestorDemo(){document.getElementById('invOv').classList.add('open');curSlide=0;renderSlide();}
function closeInvestorDemo(){document.getElementById('invOv').classList.remove('open');}
function renderSlide(){
  const s=SLIDES[curSlide];
  document.getElementById('slideCounter').textContent=`${curSlide+1} / ${SLIDES.length}`;
  const dots=Array.from({length:SLIDES.length},(_,i)=>`<div class="sdot ${i===curSlide?'active':''}" onclick="goSlide(${i})"></div>`).join('');
  document.getElementById('invSlides').innerHTML=`<div class="islide active">
    <div class="slide-ey">${s.ey}</div>
    <div class="slide-tt">${s.tt}</div>
    <div class="slide-bd">${s.bd}</div>
    <div class="slide-cards">${s.cards.map(c=>`<div class="scard"><div style="font-size:28px;margin-bottom:8px">${c.icon}</div><div style="font-size:14px;font-weight:800;color:#fff;margin-bottom:4px">${c.t}</div><div style="font-size:12px;color:rgba(255,255,255,0.6)">${c.d}</div></div>`).join('')}</div>
    <div class="sdots">${dots}</div>
  </div>`;
}
function nextSlide(){if(curSlide<SLIDES.length-1){curSlide++;renderSlide();}}
function prevSlide(){if(curSlide>0){curSlide--;renderSlide();}}
function goSlide(i){curSlide=i;renderSlide();}
